name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: input
    id: summary
    attributes:
      label: What happened?
      placeholder: Brief description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 0.3.1
