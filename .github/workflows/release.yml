name: Build and Release

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-arm64
          - os: macos-15-intel
            target: macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev --python 3.12

      - name: Prepare macOS code signing keychain
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
        run: |
          if [ -z "$CERTIFICATE_P12_BASE64" ] || [ -z "$CERTIFICATE_PASSWORD" ] || [ -z "$CODESIGN_IDENTITY" ]; then
            echo "::warning title=Unsigned macOS binary::Apple signing secrets are missing. Continuing with an unsigned macOS binary; Gatekeeper may block it for users."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/topos-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          echo "CODESIGN_IDENTITY=${CODESIGN_IDENTITY}" >> "$GITHUB_ENV"

      - name: Build binary with PyInstaller
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
        run: |
          PYINSTALLER_ARGS=(
            --name topos
            --onefile
            --clean
            --collect-all tree_sitter
            --collect-all tree_sitter_python
            --collect-all tree_sitter_rust
            --collect-all tree_sitter_javascript
            --collect-all tree_sitter_cpp
            --collect-all tree_sitter_typescript
            --collect-all topos
            --collect-all fastmcp
            --collect-all real-ladybug
            --copy-metadata fastmcp
          )

          # onefile embeds dylibs in the archive; they must be signed during
          # collection with the same Developer ID as the outer executable.
          if [ "$(uname -s)" = "Darwin" ] && [ -n "${CODESIGN_IDENTITY:-}" ]; then
            PYINSTALLER_ARGS+=(
              --codesign-identity "${CODESIGN_IDENTITY}"
              --osx-entitlements-file packaging/macos-entitlements.plist
            )
          fi

          uv run --with pyinstaller pyinstaller "${PYINSTALLER_ARGS[@]}" topos/cli/main.py

      - name: Rename binary with platform suffix
        run: mv dist/topos dist/topos-${{ matrix.target }}

      - name: Sign macOS binary
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
        run: |
          if [ -z "${CODESIGN_IDENTITY:-}" ]; then
            exit 0
          fi

          codesign --force --options runtime --timestamp \
            --entitlements packaging/macos-entitlements.plist \
            --sign "$CODESIGN_IDENTITY" "dist/topos-${{ matrix.target }}"
          codesign --verify --strict --verbose=2 "dist/topos-${{ matrix.target }}"

      - name: Notarize macOS binary archive
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "::warning title=Unnotarized macOS binary::Apple notarization secrets are missing. Continuing without notarization; Gatekeeper may block it for users."
            exit 0
          fi

          ditto -c -k --keepParent "dist/topos-${{ matrix.target }}" "$RUNNER_TEMP/topos-${{ matrix.target }}.zip"
          xcrun notarytool submit "$RUNNER_TEMP/topos-${{ matrix.target }}.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: topos-${{ matrix.target }}
          path: dist/topos-${{ matrix.target }}

  package-vscode:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - vscode_target: linux-x64
            artifact: topos-linux-amd64
          - vscode_target: linux-arm64
            artifact: topos-linux-arm64
          - vscode_target: darwin-x64
            artifact: topos-macos-amd64
          - vscode_target: darwin-arm64
            artifact: topos-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: extensions/vscode
        run: npm ci

      - name: Download runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Package VS Code extension
        working-directory: extensions/vscode
        run: npm run package:${{ matrix.vscode_target }}

      - name: Check VSIX size
        working-directory: extensions/vscode
        run: node scripts/check-vsix-size.js topos-vscode-${{ matrix.vscode_target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: topos-vscode-${{ matrix.vscode_target }}
          path: extensions/vscode/topos-vscode-${{ matrix.vscode_target }}.vsix

  release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - build
      - package-vscode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create checksums
        run: |
          cd dist
          sha256sum topos-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            dist/topos-*
            dist/topos-vscode-*
            dist/checksums.txt
          generate_release_notes: true

  publish-vscode-marketplace:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - package-vscode
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: topos-vscode-*
          merge-multiple: true

      - name: Publish VS Code Marketplace packages
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is required to publish VS Code Marketplace packages."
            exit 1
          fi

          npx --yes @vscode/vsce publish --packagePath dist/topos-vscode-darwin-arm64.vsix
          npx --yes @vscode/vsce publish --packagePath dist/topos-vscode-darwin-x64.vsix
          npx --yes @vscode/vsce publish --packagePath dist/topos-vscode-linux-arm64.vsix
          npx --yes @vscode/vsce publish --packagePath dist/topos-vscode-linux-x64.vsix
