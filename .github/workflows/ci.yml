name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check versions (Cargo.toml is source of truth)
        run: python scripts/check_versions.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run Python tests
        run: uv run pytest -v

      - name: Run Rust tests
        run: uv run --python ${{ matrix.python-version }} cargo test

      - name: Run Rust clippy
        if: matrix.python-version == '3.13'
        run: uv run --python 3.13 cargo clippy -- -D warnings

      - name: Run Rust fmt
        if: matrix.python-version == '3.13'
        run: cargo fmt --check

      - name: Run Ruff lint checks
        if: matrix.python-version == '3.13'
        run: uv run ruff check topos tests

      - name: Run Ruff formatting checks
        if: matrix.python-version == '3.13'
        run: uv run ruff format --check topos tests

  cli-startup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev --python 3.12

      - name: Build release binary
        run: |
          chmod +x scripts/build-binary.sh
          ./scripts/build-binary.sh
          mv dist/topos dist/topos-linux-amd64
          ls -lh dist/topos-linux-amd64

      - name: Dogfood release binary
        env:
          TOPOS_BINARY: dist/topos-linux-amd64
          TOPOS_BENCHMARK: "1"
          TOPOS_BENCHMARK_RUNS: "5"
          TOPOS_VERSION_BUDGET_S: "2.5"
          TOPOS_HELP_BUDGET_S: "3.5"
          TOPOS_MCP_SMOKE_TIMEOUT_S: "180"
        run: |
          chmod +x "$TOPOS_BINARY"
          uv run pytest tests/packaging/ -v --no-cov
          # Gate only the documented trivial-command budgets (--version, --help).
          # `evaluate --help` loads the full stack; its correctness is covered by
          # tests/packaging/, and its latency is not a documented budget.
          uv run pytest tests/benchmarks/test_cli_startup.py -s --no-cov -k "warm and not evaluate"

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: extensions/vscode/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: extensions/vscode/pnpm-lock.yaml

      - name: Install extension dependencies
        working-directory: extensions/vscode
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: extensions/vscode
        run: pnpm run check-types

      - name: Lint
        working-directory: extensions/vscode
        run: pnpm run lint

      - name: Unit tests
        working-directory: extensions/vscode
        run: pnpm run test:unit
