name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check versions (Cargo.toml is source of truth)
        run: python scripts/check_versions.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run Python tests
        run: uv run pytest -v

      - name: Run Rust tests
        run: uv run --python ${{ matrix.python-version }} cargo test

      - name: Run Rust clippy
        if: matrix.python-version == '3.13'
        run: uv run --python 3.13 cargo clippy -- -D warnings

      - name: Run Rust fmt
        if: matrix.python-version == '3.13'
        run: cargo fmt --check

      - name: Run Ruff lint checks
        if: matrix.python-version == '3.13'
        run: uv run ruff check topos tests

      - name: Run Ruff formatting checks
        if: matrix.python-version == '3.13'
        run: uv run ruff format --check topos tests

  cli-startup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev --python 3.12

      - name: Build release binary
        run: |
          # Keep in sync with the PYINSTALLER_ARGS in
          # .github/workflows/release.yml so this budget check reflects what
          # actually ships.
          uv run --with pyinstaller pyinstaller \
            --name topos \
            --onefile \
            --noupx \
            --clean \
            --collect-all tree_sitter \
            --collect-all tree_sitter_python \
            --collect-all tree_sitter_rust \
            --collect-all tree_sitter_javascript \
            --collect-all tree_sitter_cpp \
            --collect-all tree_sitter_typescript \
            --collect-all fastmcp \
            --collect-all ladybug \
            --copy-metadata fastmcp \
            --add-data Cargo.toml:. \
            --hidden-import topos.core.category \
            --hidden-import topos.core.morphism \
            --hidden-import topos.core.object \
            --hidden-import topos.core.omega \
            --hidden-import topos.evaluation.characteristic_morphism \
            --hidden-import topos.graphs.base \
            --hidden-import topos.graphs.ast.object \
            --hidden-import topos.graphs.cfg.object \
            --hidden-import topos.graphs.pdg.object \
            --hidden-import topos.graphs.mdg.object \
            --hidden-import topos.graphs.cpg.object \
            topos/cli/main.py
          mv dist/topos dist/topos-linux-amd64
          ls -lh dist/topos-linux-amd64

      - name: Assert release binary startup budget
        env:
          TOPOS_BENCHMARK: "1"
          TOPOS_BINARY: dist/topos-linux-amd64
          TOPOS_BENCHMARK_RUNS: "5"
          TOPOS_VERSION_BUDGET_S: "2.5"
          TOPOS_HELP_BUDGET_S: "3.5"
        run: uv run pytest tests/benchmarks/test_cli_startup.py -s --no-cov -k "warm"

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: extensions/vscode
        run: npm ci

      - name: Type-check
        working-directory: extensions/vscode
        run: npm run check-types

      - name: Lint
        working-directory: extensions/vscode
        run: npm run lint

      - name: Unit tests
        working-directory: extensions/vscode
        run: npm run test:unit
