name: OpenWiki Update

# Canonical OpenWiki workflow for this repo.
#
# Triggers (no cron):
#   1. PR merged / code pushed to main (non-docs paths)
#   2. Manual: Actions → OpenWiki Update → Run workflow
#
# paths-ignore covers openwiki/**, AGENTS.md, CLAUDE.md so merging the
# auto-generated docs PR does not re-run OpenWiki and burn credits.
#
# OpenWiki's CLI always rewrites `.github/workflows/openwiki-update.yml` to a
# stock scheduled template during `openwiki code --update`. We deliberately:
#   1. use this file (openwiki.yml) as the only committed workflow
#   2. delete any regenerated openwiki-update.yml after the CLI runs
#   3. never include workflow files in the create-pull-request add-paths
# so OpenWiki cannot change our trigger/settings via its auto-docs PR.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "openwiki/**"
      - "AGENTS.md"
      - "CLAUDE.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        # --update also handles the first run for code docs when env vars are set.
        # Side effect: OpenWiki rewrites openwiki-update.yml (stock cron template).
        #
        # Cost: OPENAI_API_KEY + OPENWIKI_MODEL_ID=gpt-5.6-terra — each run is a
        # full regeneration billed to the OpenAI account. Prefer intentional runs
        # (post-merge or a single manual smoke), not casual re-fires.
        run: openwiki code --update --print
        env:
          # OpenWiki sends anonymous reliability telemetry from CI runs.
          # Uncomment to disable:
          # OPENWIKI_TELEMETRY_DISABLED: "1"
          OPENWIKI_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENWIKI_MODEL_ID: gpt-5.6-terra
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_PROJECT: openwiki
          LANGCHAIN_TRACING_V2: "true"

      - name: Discard OpenWiki workflow overwrite
        # OpenWiki always writes .github/workflows/openwiki-update.yml with a
        # daily cron. Drop it so it never lands in the docs PR or on main.
        run: |
          rm -f .github/workflows/openwiki-update.yml
          git checkout -- .github/workflows/openwiki.yml 2>/dev/null || true

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          # Intentionally omit .github/workflows/** so OpenWiki cannot change
          # our trigger settings (no cron; main-only) via the docs PR.
          add-paths: |
            openwiki
            AGENTS.md
            CLAUDE.md
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the OpenWiki workflow after changes landed on main
            (or a manual **Run workflow**). Prefer this generated docs PR over hand-editing
            OpenWiki pages.

            > [!NOTE]
            > **OpenAI usage:** This workflow calls OpenAI with `OPENWIKI_MODEL_ID=gpt-5.6-terra`
            > via the repo secret `OPENAI_API_KEY`. Each run bills the OpenAI account for a full
            > OpenWiki regeneration. Prefer intentional runs—after meaningful code merges or a
            > single manual smoke—and avoid repeated or speculative executions. Pure
            > `openwiki/**` / `AGENTS.md` / `CLAUDE.md` merges are ignored so this auto-docs PR
            > does not re-trigger itself.

            Workflow settings (`.github/workflows/openwiki.yml`) are intentionally excluded
            so OpenWiki cannot reintroduce a cron schedule.
