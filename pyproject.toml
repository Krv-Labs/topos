[project]
name = "topos"
version = "0.2.0"
description = "Treating programs as morphisms in a world of commodity code. Building the subobject classifier for rigorous program evaluations."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "BSD-3-Clause" }
authors = [{ name = "Krv Labs", email = "team@krv.ai"}]
keywords = ["code-quality", "static-analysis", "category-theory", "topos", "ast"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
]

dependencies = [
    "tree-sitter>=0.23",
    "tree-sitter-python>=0.23",
    "tree-sitter-rust>=0.23",
    "tree-sitter-javascript>=0.23",
    "tree-sitter-cpp>=0.23",
    "click>=8.1",
    "fastmcp>=3.0.0",
    "numpy>=1.24",
    "real-ladybug>=0.15",
]



[project.scripts]
topos = "topos.main:cli"
topos-mcp = "topos.mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/topos"]

[tool.hatch.build.targets.wheel.force-include]
"src/topos/mcp/resources/content" = "topos/mcp/resources/content"

[tool.ruff]
src = ["src"]
line-length = 88
extend-exclude = ["demos/binarytrees/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--cov=src/topos --cov-report=term-missing"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.8",
]
docs = [
    "sphinx>=7.4,<9",
    "furo>=2024.8.6",
    "sphinx-design>=0.6.1",
    "sphinxcontrib-mermaid>=0.9.2",
    "nbsphinx>=0.9.5",
    "sphinx-copybutton>=0.5.2",
]
