name: Build and Release

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (v0.1.0 or 0.1.0; normalized to v*)"
        required: true
      pypi_only:
        description: "Publish only PyPI artifacts"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ---- Native `topos` binary (includes `topos mcp`) per platform -----------
  build:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.pypi_only) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p topos

      - name: Stage binary with platform suffix
        run: |
          mkdir -p dist
          cp target/release/topos "dist/topos-${{ matrix.target }}"

      - name: Prepare macOS code signing keychain
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
        run: |
          if [ -z "$CERTIFICATE_P12_BASE64" ] || [ -z "$CERTIFICATE_PASSWORD" ] || [ -z "$CODESIGN_IDENTITY" ]; then
            echo "::warning title=Unsigned macOS binary::Apple signing secrets are missing. Continuing with an unsigned macOS binary; Gatekeeper may block it for users."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/topos-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          echo "CODESIGN_IDENTITY=${CODESIGN_IDENTITY}" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
        run: |
          if [ -z "${CODESIGN_IDENTITY:-}" ]; then
            exit 0
          fi
          BINARY_PATH="dist/topos-${{ matrix.target }}"
          # A pure Rust binary needs only the hardened runtime — no JIT /
          # unsigned-executable-memory entitlements (those were for the old
          # PyInstaller/CPython bundle).
          codesign --force --options runtime --timestamp \
            --sign "$CODESIGN_IDENTITY" "${BINARY_PATH}"
          codesign --verify --strict --verbose=2 "${BINARY_PATH}"

      - name: Notarize macOS binary archive
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "::warning title=Unnotarized macOS binary::Apple notarization secrets are missing. Continuing without notarization; Gatekeeper may block it for users."
            exit 0
          fi
          BINARY_PATH="dist/topos-${{ matrix.target }}"
          ARCHIVE_NAME="topos-${{ matrix.target }}"
          ditto -c -k --keepParent "${BINARY_PATH}" "$RUNNER_TEMP/${ARCHIVE_NAME}.zip"
          xcrun notarytool submit "$RUNNER_TEMP/${ARCHIVE_NAME}.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: topos-${{ matrix.target }}
          path: dist/topos-${{ matrix.target }}

  package-vscode:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - vscode_target: linux-x64
            artifact: topos-linux-amd64
          - vscode_target: linux-arm64
            artifact: topos-linux-arm64
          - vscode_target: darwin-arm64
            artifact: topos-macos-arm64
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: extensions/vscode/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: extensions/vscode/pnpm-lock.yaml

      - name: Install extension dependencies
        working-directory: extensions/vscode
        run: pnpm install --frozen-lockfile

      - name: Download runtime artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Package VS Code extension
        working-directory: extensions/vscode
        run: pnpm run package:${{ matrix.vscode_target }}

      - name: Check VSIX size
        working-directory: extensions/vscode
        run: node scripts/check-vsix-size.js topos-vscode-${{ matrix.vscode_target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: topos-vscode-${{ matrix.vscode_target }}
          path: extensions/vscode/topos-vscode-${{ matrix.vscode_target }}.vsix

  release:
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !(github.event_name == 'workflow_dispatch' && inputs.pypi_only) }}
    needs:
      - build
      - package-vscode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF#refs/tags/}"
          fi
          # Accept 0.1.0 or v0.1.0; release tags and formula URLs always use v*.
          VERSION="v${RAW#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create checksums
        run: |
          cd dist
          sha256sum topos-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            dist/topos-*
            dist/topos-vscode-*
            dist/checksums.txt
          generate_release_notes: true

  publish-homebrew:
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !(github.event_name == 'workflow_dispatch' && inputs.pypi_only) }}
    needs:
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF#refs/tags/}"
          fi
          # Accept 0.1.0 or v0.1.0; release tags and formula URLs always use v*.
          VERSION="v${RAW#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.version.outputs.VERSION }}
          # gh talks to the tap repo with the dedicated PAT (not GITHUB_TOKEN).
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::warning title=Homebrew formula not published::HOMEBREW_TAP_TOKEN secret is missing. Skipping Homebrew tap update for ${TAG}."
            exit 0
          fi

          VERSION="${TAG#v}"
          BRANCH="bot/topos-${VERSION}"
          TAP_REPO="Krv-Labs/homebrew-tap"

          curl --fail --silent --show-error --location --retry 5 --retry-delay 10 --retry-all-errors \
            "https://github.com/Krv-Labs/topos/releases/download/${TAG}/checksums.txt" \
            -o checksums.txt

          sha_for() {
            sha=$(awk -v asset="$1" '$2 == asset { print $1 }' checksums.txt)
            if [ -z "$sha" ]; then
              echo "Missing checksum for $1 in checksums.txt" >&2
              exit 1
            fi
            echo "$sha"
          }

          SHA_MACOS_ARM64=$(sha_for topos-macos-arm64)
          SHA_LINUX_AMD64=$(sha_for topos-linux-amd64)
          SHA_LINUX_ARM64=$(sha_for topos-linux-arm64)

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA_MACOS_ARM64}}/${SHA_MACOS_ARM64}/g" \
            -e "s/{{SHA_LINUX_AMD64}}/${SHA_LINUX_AMD64}/g" \
            -e "s/{{SHA_LINUX_ARM64}}/${SHA_LINUX_ARM64}/g" \
            packaging/homebrew/topos.rb.template > topos.rb

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" homebrew-tap
          mkdir -p homebrew-tap/Formula
          cp topos.rb homebrew-tap/Formula/topos.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${BRANCH}"
          git add Formula/topos.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged for ${VERSION}; nothing to publish."
            exit 0
          fi

          git commit -m "topos ${VERSION}"
          # Open/update a PR so tap CI (style/audit/fetch/test-bot) gates the
          # formula bump instead of pushing straight to main.
          git push -u origin "${BRANCH}" --force

          PR_URL=$(gh pr list --repo "${TAP_REPO}" --head "${BRANCH}" --state open --json url --jq '.[0].url // empty')
          if [ -z "${PR_URL}" ]; then
            PR_BODY="Automated formula bump for topos ${VERSION}. Rendered from packaging/homebrew/topos.rb.template in Krv-Labs/topos after GitHub release assets were published. Tap CI should verify style, audit, multi-platform fetch, install, and brew test."
            PR_URL=$(gh pr create --repo "${TAP_REPO}" \
              --base main \
              --head "${BRANCH}" \
              --title "topos ${VERSION}" \
              --body "${PR_BODY}")
          fi

          echo "Homebrew tap PR: ${PR_URL}"

          # Best-effort: enable auto-merge when the repo allows it. Merge still
          # waits on required checks; failure here must not fail the release.
          if ! gh pr merge --repo "${TAP_REPO}" --auto --squash "${PR_URL}"; then
            echo "::notice title=Homebrew tap PR opened::Auto-merge not enabled or unavailable for ${PR_URL}. Merge after CI is green."
          fi

  publish-vscode-marketplace:
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !(github.event_name == 'workflow_dispatch' && inputs.pypi_only) }}
    needs:
      - package-vscode
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: topos-vscode-*
          merge-multiple: true

      - name: Publish VS Code Marketplace packages
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is required to publish VS Code Marketplace packages."
            exit 1
          fi
          npx --yes @vscode/vsce@3.9.2 publish --packagePath dist/topos-vscode-darwin-arm64.vsix
          npx --yes @vscode/vsce@3.9.2 publish --packagePath dist/topos-vscode-linux-arm64.vsix
          npx --yes @vscode/vsce@3.9.2 publish --packagePath dist/topos-vscode-linux-x64.vsix

  # ---- PyPI: thin `bin` wheels wrapping the topos-mcp server binary --------
  build-pypi-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 2_34 (AlmaLinux 9) ships OpenSSL 3 — required by the lbug
          # prebuilt (SSL_get1_peer_certificate). 2_28 only has OpenSSL 1.1.
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_34"
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: "2_34"
          - os: macos-latest
            target: aarch64
            manylinux: "off"
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # lbug links OpenSSL; macOS source builds also need cmake and a
      # deployment target new enough for C++ `to_chars` (macOS 13.3+).
      - name: Install macOS build deps (lbug / OpenSSL)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 cmake
          echo "MACOSX_DEPLOYMENT_TARGET=13.3" >> "$GITHUB_ENV"
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Build bin wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          # manylinux images are AlmaLinux-based; openssl must be installed
          # inside the container (host apt packages are invisible).
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              # openssl-devel/cmake live in base/AppStream; skip EPEL to avoid mirror flakes.
              dnf install -y --disablerepo='epel*' openssl-devel cmake pkgconfig
            elif command -v yum >/dev/null 2>&1; then
              yum install -y --disablerepo='epel*' openssl-devel cmake pkgconfig
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                libssl-dev cmake pkg-config
            else
              echo "No supported package manager in manylinux container" >&2
              exit 1
            fi
            # Sanity: lbug prebuilts need OpenSSL 3 symbols.
            if ! ldconfig -p 2>/dev/null | grep -q 'libssl\.so\.3'; then
              if [ ! -e /usr/lib64/libssl.so.3 ] && [ ! -e /usr/lib/libssl.so.3 ]; then
                echo "OpenSSL 3 not found in manylinux image; lbug link will fail" >&2
                exit 1
              fi
            fi
          args: >-
            --release --bindings bin
            --manifest-path topos/mcp/Cargo.toml
            --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  publish-pypi:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - build-pypi-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
