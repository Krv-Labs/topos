name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check versions (Cargo.toml is source of truth)
        run: python3 scripts/check_versions.py

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Smoke-test the MCP server over stdio
        run: |
          cargo build -p topos-mcp --bin topos-mcp
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
          | TOPOS_MCP_FILE_ROOT="$PWD" ./target/debug/topos-mcp \
          | grep -q '"topos_evaluate_code"'

  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the topos-mcp bin wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --bindings bin --manifest-path crates/topos-mcp/Cargo.toml --out dist

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: extensions/vscode/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: extensions/vscode/pnpm-lock.yaml

      - name: Install extension dependencies
        working-directory: extensions/vscode
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: extensions/vscode
        run: pnpm run check-types

      - name: Lint
        working-directory: extensions/vscode
        run: pnpm run lint

      - name: Unit tests
        working-directory: extensions/vscode
        run: pnpm run test:unit
