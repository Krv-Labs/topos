name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check versions (Cargo.toml is source of truth)
        run: python scripts/check_versions.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run Python tests
        run: uv run pytest -v

      - name: Run Rust tests
        run: uv run --python ${{ matrix.python-version }} cargo test

      - name: Run Rust clippy
        if: matrix.python-version == '3.13'
        run: uv run --python 3.13 cargo clippy -- -D warnings

      - name: Run Rust fmt
        if: matrix.python-version == '3.13'
        run: cargo fmt --check

      - name: Run Ruff lint checks
        if: matrix.python-version == '3.13'
        run: uv run ruff check topos tests

      - name: Run Ruff formatting checks
        if: matrix.python-version == '3.13'
        run: uv run ruff format --check topos tests

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: extensions/vscode
        run: npm ci

      - name: Type-check
        working-directory: extensions/vscode
        run: npm run check-types

      - name: Lint
        working-directory: extensions/vscode
        run: npm run lint

      - name: Unit tests
        working-directory: extensions/vscode
        run: npm run test:unit
