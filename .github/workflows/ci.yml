name: CI

on:
  push:
    branches: [main, worktree-rust-migration-v0.4.0]
  pull_request:
    branches: [main, worktree-rust-migration-v0.4.0]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check versions (Cargo.toml is source of truth)
        run: python3 scripts/check_versions.py

      - name: Check agent skills
        run: python3 scripts/check_skill.py

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Crates.io publish dry-run (dependency order)
        run: bash scripts/cargo_publish_dry_run.sh

      - name: Smoke-test the MCP server over stdio
        run: |
          cargo build -p topos-mcp --bin topos-mcp
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
          | TOPOS_MCP_FILE_ROOT="$PWD" ./target/debug/topos-mcp \
          | grep -q '"topos_evaluate_code"'

  composable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build deps (lbug / OpenSSL)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pinned GitNexus
        run: npm install -g gitnexus@1.6.8

      - name: Build topos CLI
        run: cargo build -p topos --bin topos

      - name: Analyze fixture and assert COMPOSABLE scores
        run: |
          set -euo pipefail
          BIN="$GITHUB_WORKSPACE/target/debug/topos"
          FIXTURE_SRC="$GITHUB_WORKSPACE/tests/fixtures/composable_mdg"
          WORK="$(mktemp -d)"
          cp -R "$FIXTURE_SRC/." "$WORK/"
          cd "$WORK"
          git init
          git config user.email "ci@topos.local"
          git config user.name "topos-ci"
          git add -A
          git commit -m "fixture"
          gitnexus analyze --skip-agents-md
          test -f .gitnexus/lbug
          test ! -d .gitnexus/lbug
          OUT="$(mktemp)"
          ERR="$(mktemp)"
          "$BIN" evaluate --language rust src/lib.rs >"$OUT" 2>"$ERR"
          echo "=== stdout ==="
          cat "$OUT"
          echo "=== stderr ==="
          cat "$ERR"
          if grep -q "no indexed store found" "$ERR"; then
            echo "COMPOSABLE silently fell back to no-store messaging" >&2
            exit 1
          fi
          if ! grep -E -q 'composable:' "$OUT"; then
            echo "COMPOSABLE pillar missing from evaluate output" >&2
            exit 1
          fi

  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the topos-mcp bin wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: "2_34"
          # manylinux_2_34 (AlmaLinux 9) ships OpenSSL 3 — required by the
          # lbug prebuilt. Building on the host ubuntu-latest linker pulls in
          # a second copy of antlr4 (duplicate symbols with liblbug.a).
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              # openssl-devel/cmake live in base/AppStream; skip EPEL to avoid mirror flakes.
              dnf install -y --disablerepo='epel*' openssl-devel cmake pkgconfig
            elif command -v yum >/dev/null 2>&1; then
              yum install -y --disablerepo='epel*' openssl-devel cmake pkgconfig
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                libssl-dev cmake pkg-config
            else
              echo "No supported package manager in manylinux container" >&2
              exit 1
            fi
          args: --release --bindings bin --manifest-path topos/mcp/Cargo.toml --out dist

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: extensions/vscode/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: extensions/vscode/pnpm-lock.yaml

      - name: Install extension dependencies
        working-directory: extensions/vscode
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: extensions/vscode
        run: pnpm run check-types

      - name: Lint
        working-directory: extensions/vscode
        run: pnpm run lint

      - name: Unit tests
        working-directory: extensions/vscode
        run: pnpm run test:unit
